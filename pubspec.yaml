name: pointcloud_capture
description: Real-time 3D point cloud capture using LiDAR and ARKit
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Functional error handling
  fpdart: ^1.1.0

  # Navigation
  go_router: ^14.6.2

  # Permissions
  permission_handler: ^11.4.0

  # File system & export
  path_provider: ^2.1.5
  path: ^1.9.1
  share_plus: ^10.1.4

  # Image handling (RGBA -> JPEG thumbnail)
  image: ^4.3.0

  # UUID for SavedCapture IDs
  uuid: ^4.5.1

  # Matrix math (used in domain entities)
  vector_math: ^2.2.0

  # Device info
  device_info_plus: ^11.3.3

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.4
  build_runner: ^2.4.14
  custom_lint: ^0.7.2
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
